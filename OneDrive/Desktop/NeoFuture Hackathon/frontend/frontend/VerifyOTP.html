<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OTP Verification - Invisible India</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#7d2b21",
                    "surface-container": "#eeeeee",
                    "on-secondary": "#ffffff",
                    "surface": "#f9f9f9",
                    "on-primary-fixed-variant": "#353e91",
                    "on-error": "#ffffff",
                    "surface-bright": "#f9f9f9",
                    "outline": "#767683",
                    "on-secondary-container": "#6c5000",
                    "surface-container-low": "#f3f3f3",
                    "primary-container": "#010766",
                    "background": "#f9f9f9",
                    "primary": "#000000",
                    "surface-container-high": "#e8e8e8",
                    "on-primary-fixed": "#010766",
                    "tertiary": "#000000",
                    "on-secondary-fixed-variant": "#5b4300",
                    "inverse-primary": "#bdc2ff",
                    "inverse-on-surface": "#f1f1f1",
                    "primary-fixed": "#e0e0ff",
                    "error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#ffb4a8",
                    "on-error-container": "#93000a",
                    "outline-variant": "#c6c5d3",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#410000",
                    "on-surface-variant": "#464651",
                    "on-secondary-fixed": "#251a00",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#bdc2ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#785a00",
                    "on-tertiary-container": "#cb6657",
                    "secondary-fixed-dim": "#f9bd00",
                    "tertiary-fixed": "#ffdad4",
                    "surface-dim": "#dadada",
                    "on-primary-container": "#747cd3",
                    "tertiary-container": "#410000",
                    "error": "#ba1a1a",
                    "surface-tint": "#4e56ab",
                    "surface-container-highest": "#e2e2e2",
                    "secondary-container": "#fdc002",
                    "on-surface": "#1a1c1c",
                    "inverse-surface": "#2f3131",
                    "secondary-fixed": "#ffdf9d",
                    "on-background": "#1a1c1c"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #010766 0%, #747cd3 100%);
        }
        .soft-ambient-shadow {
            box-shadow: 0 40px 40px -15px rgba(26, 28, 28, 0.06);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Top Navigation Suppressed (Transactional State) -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12 relative overflow-hidden">
<!-- Background Editorial Element -->
<div class="absolute top-[-10%] right-[-5%] w-[600px] h-[600px] rounded-full bg-secondary-container/10 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[500px] h-[500px] rounded-full bg-primary-container/5 blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-xl z-10">
<!-- Back Action -->
<button class="mb-12 flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors group">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-headline font-bold text-sm tracking-tight">Back</span>
</button>
<!-- Card Shell -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-16 soft-ambient-shadow relative overflow-hidden">
<!-- Branding Anchor -->
<div class="mb-10">
<span class="font-headline font-extrabold text-2xl tracking-tighter bg-gradient-to-br from-indigo-900 to-indigo-500 bg-clip-text text-transparent">Invisible India</span>
</div>
<!-- Editorial Header -->
<header class="mb-12">
<h1 class="font-headline font-bold text-4xl md:text-5xl text-on-surface leading-tight tracking-tight mb-4">
                        Secure your <br/><span class="text-on-primary-container">access.</span>
</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md">
                        We’ve sent a 4-digit verification code to your registered mobile number. Please enter it below to continue.
                    </p>
</header>
<!-- OTP Form -->
<form action="#" class="space-y-10">
<div class="flex gap-4 md:gap-6 justify-between max-w-sm">
<!-- Digit 1 -->
<div class="flex-1 aspect-square bg-surface-container-low rounded-lg focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-on-primary-container/20 transition-all duration-300">
<input autocomplete="one-time-code" class="w-full h-full text-center text-3xl font-headline font-bold bg-transparent border-none focus:ring-0 text-indigo-900" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Digit 2 -->
<div class="flex-1 aspect-square bg-surface-container-low rounded-lg focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-on-primary-container/20 transition-all duration-300">
<input class="w-full h-full text-center text-3xl font-headline font-bold bg-transparent border-none focus:ring-0 text-indigo-900" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Digit 3 -->
<div class="flex-1 aspect-square bg-surface-container-low rounded-lg focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-on-primary-container/20 transition-all duration-300">
<input class="w-full h-full text-center text-3xl font-headline font-bold bg-transparent border-none focus:ring-0 text-indigo-900" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Digit 4 -->
<div class="flex-1 aspect-square bg-surface-container-low rounded-lg focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-on-primary-container/20 transition-all duration-300">
<input class="w-full h-full text-center text-3xl font-headline font-bold bg-transparent border-none focus:ring-0 text-indigo-900" maxlength="1" placeholder="•" type="text"/>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-6">
<button class="signature-gradient text-on-primary py-5 px-10 rounded-xl font-headline font-bold text-lg soft-ambient-shadow hover:opacity-90 active:scale-95 transition-all w-full md:w-fit" type="submit">
                            Verify OTP
                        </button>
<div class="flex items-center gap-4">
<p class="text-on-surface-variant text-sm font-medium">Didn't receive a code?</p>
<button class="text-secondary font-headline font-bold text-sm hover:underline hover:text-on-secondary-container transition-all" type="button">Resend OTP</button>
</div>
</div>
</form>
<!-- Decorative Human Element -->
<div class="absolute -right-20 -bottom-20 w-64 h-64 opacity-[0.03] pointer-events-none">
<span class="material-symbols-outlined text-[200px]" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-12 flex items-center justify-between px-4">
<p class="text-on-surface-variant/60 text-xs font-label">
                    By continuing, you agree to our <a class="underline" href="#">Terms of Service</a>.
                </p>
<div class="flex gap-4">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/30"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/30"></div>
</div>
</div>
</div>
</main>
<!-- Footer Suppressed (Transactional State) -->
</body></html>
